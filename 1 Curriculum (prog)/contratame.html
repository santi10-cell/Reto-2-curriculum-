<main>
    <section class="seccion-formulario">
        <h3 class="Formulario">Formulario de Contacto</h3>
        <form action="#" method="post"> <div class="campo">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre aquí" required>
            </div>

            <div class="campo">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="campo">
                <label for="pais">País:</label>
                <select name="pais" id="pais">
                    <option value="Argentina">Argentina</option>
                    <option value="Brasil">Brasil</option>
                    <option value="Uruguay">Uruguay</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="campo">
                <label for="mensaje">Propuesta o Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu propuesta..."></textarea>
            </div>

            <input type="submit" value="Enviar Propuesta" class="boton-enviar">
        </form> 
    </section>
</main>

    <footer class="footer-sociales">
        <p>Contactame en mis redes</p>
        <div class="REDES">
            <a href="https://wa.me/3585730883" target="_blank" class="icono-red">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        </div>
        <div>
            <a href="https://mail.google.com/mail/u/0/#inbox"></a>
            <img src="img/gmail-logo-png_seeklogo-192307.webp" alt="Gmail">
        </div>
    </footer>
